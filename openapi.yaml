    post:
      operationId: messagesSend
      x-codeSamples:
        - lang: 'curl'
          source: |
            curl -X POST 'https://api.botix.pro/public/v1/messages' \
              -H 'Authorization: Bearer btx_live_<ваш-ключ>' \
              -H 'Content-Type: application/json' \
              -H "Idempotency-Key: $(uuidgen)" \
              -d '{
                "contact_id": 12345,
