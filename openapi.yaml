                "content": "Здравствуйте! Ваш заказ #1024 готов."
            }'
        - lang: 'PHP'
          label: 'PHP (botix-pro/sdk)'
          source: |
            <?php
            use BotixPro\Sdk\Client;
            
            $client = new Client('btx_live_<ваш-ключ>');
            $result = $client->messages()->messagesSend(['contact_id' => 12345, 'channel' => 'telegram', 'content' => 'Здравствуйте! Ваш заказ #1024 готов.']);
            print_r($result);
        - lang: 'Python'
          label: 'Python (botix)'
          source: |
            import botix
            
            client = botix.Client('btx_live_<ваш-ключ>')
            result = client.messages.messages_send(contact_id=12345, channel='telegram', content='Здравствуйте! Ваш заказ #1024 готов.')
            print(result)
        - lang: 'JavaScript'
          label: 'Node.js (@botix/sdk)'
          source: |
            import { BotixClient } from '@botix/sdk';
            
            const client = new BotixClient('btx_live_<ваш-ключ>');
            const result = await client.messages.messagesSend({ contact_id: 12345, channel: 'telegram', content: 'Здравствуйте! Ваш заказ #1024 готов.' });
            console.log(result);
      tags: ["Messages"]
      summary: Отправить сообщение
      description: |
        Реально отправляет сообщение в канал (Telegram/widget/VK) и фиксирует его
        в истории. Канал выбирается так:
        1. явный `channel` в payload (если передан);
        2. `last_channel` контакта;
        3. иначе 422 `NO_CHANNEL_AVAILABLE`.

        Поддерживается заголовок `Idempotency-Key` (стандарт Stripe): повторный
        запрос с тем же ключом в течение 24 часов вернёт сохранённый ответ без
        новой отправки. Ответ будет содержать заголовок `Idempotent-Replayed: 1`.
      parameters:
        - in: header
          name: Idempotency-Key
          required: false
          schema: { type: string, maxLength: 255 }
          description: |
            Уникальный токен запроса для защиты от дублей при сетевых сбоях. Рекомендация —
            UUID v4 на каждую логическую операцию. **TTL ключа — 24 часа.** После истечения
            тот же `Idempotency-Key` создаст новую операцию, кешированный результат не
            возвращается. Повтор в окне 24 часов вернёт сохранённый ответ + заголовок
            `Idempotent-Replayed: 1`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [contact_id, content]
              properties:
                contact_id: { type: integer }
                channel:
                  type: string
                  description: "telegram | widget | vk. Опционально — иначе берётся last_channel контакта."
                content: { type: string }
                attachments:
                  type: array
                  items:
                    type: object
                    properties:
                      type: { type: string, example: "image" }
                      url: { type: string, format: uri }
                      name: { type: string }
      responses:
        '200':
          description: Сообщение успешно отправлено каналом
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      id: { type: integer }
                      message_id: { type: integer }
                      conversation_id: { type: integer }
                      contact_id: { type: integer }
                      channel: { type: string }
                      status: { type: string, example: "sent" }
        '422':
          description: |
            Не удалось отправить из-за состояния (контакт/канал). Возможные коды:
            `NO_CHANNEL_AVAILABLE`, `CHANNEL_NOT_SUPPORTED_YET`, `CHANNEL_NOT_ALLOWED`,
            `CHANNEL_NOT_CONNECTED`, `CONTACT_NOT_REACHABLE`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '502':
          description: Канал ответил ошибкой при отправке (`DELIVERY_FAILED`)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

