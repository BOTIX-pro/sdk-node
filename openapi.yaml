            console.log(result);
      tags: ["Scenarios"]
      summary: Запустить сценарий для контакта
      description: |
        Запускает сценарий синхронно: создаёт conversation, отправляет первый блок
        в канал, возвращает 200 OK c результатом. Для widget-канала первый блок
        возвращается прямо в ответе (`first_block`/`first_blocks`); для остальных
        каналов он уходит сразу пользователю, в ответе остаётся пустым.

        Поддерживает `Idempotency-Key` (24ч). Если контакт сейчас в другом сценарии —
        вернётся 422 `CONTACT_BUSY`; передайте `force=true`, чтобы прервать предыдущий
        диалог.
      parameters:
        - in: header
          name: Idempotency-Key
          required: false
          schema: { type: string, maxLength: 255 }
          description: |
            Уникальный токен запроса для защиты от дублей при сетевых сбоях. Рекомендация —
            UUID v4 на каждую логическую операцию. **TTL ключа — 24 часа.** После истечения
            тот же `Idempotency-Key` создаст новую операцию, кешированный результат не
            возвращается. Повтор в окне 24 часов вернёт сохранённый ответ + заголовок
            `Idempotent-Replayed: 1`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [contact_id]
              properties:
                contact_id: { type: integer }
                channel:
                  type: string
                  description: "telegram | widget | vk. Опционально — иначе берётся last_channel контакта."
                variables:
                  type: object
                  additionalProperties: true
                force:
                  type: boolean
                  default: false
                  description: Принудительно прервать активный сценарий контакта.
      responses:
        '200':
          description: Сценарий запущен
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      conversation_id: { type: integer }
                      scenario_id: { type: integer }
                      channel: { type: string }
                      status: { type: string, example: "started" }
                      first_block:
                        type: object
                        nullable: true
                        description: Первый рендер сценария (widget-канал — заполнено; tg/vk — пусто).
                      first_blocks:
                        type: array
                        items:
                          type: object
        '422':
          description: |
            Возможные коды: `SCENARIO_INACTIVE`, `CONTACT_NOT_FOUND`, `NO_CHANNEL_AVAILABLE`,
            `CHANNEL_NOT_SUPPORTED_YET`, `CHANNEL_NOT_ALLOWED`, `CHANNEL_NOT_CONNECTED`,
            `CONTACT_NOT_REACHABLE`, `CONTACT_BUSY`, `NO_START_BLOCK`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          $ref: '#/components/responses/NotFound'

