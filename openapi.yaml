            console.log(result);
      tags: ["Messages"]
      summary: Массовая отправка сообщений (v1.1)
      description: |
        Отправляет до 50 сообщений одним запросом. Каждое — независимо: частичный
        успех допустим. Результат каждого item — либо `message_id` (успех), либо `error`.

        Per-channel rate-limit (Telegram 30 msg/sec и т.п.) **не обходится** — если канал
        отвергает сообщение из-за своего лимита, item помечается `DELIVERY_FAILED`.

        Поддерживает `Idempotency-Key`.
      parameters:
        - in: header
          name: Idempotency-Key
          required: false
          schema: { type: string, maxLength: 255 }
          description: |
            Уникальный токен запроса для защиты от дублей при сетевых сбоях. Рекомендация —
            UUID v4 на каждую логическую операцию. **TTL ключа — 24 часа.** После истечения
            тот же `Idempotency-Key` создаст новую операцию, кешированный результат не
            возвращается. Повтор в окне 24 часов вернёт сохранённый ответ + заголовок
            `Idempotent-Replayed: 1`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [messages]
              properties:
                messages:
                  type: array
                  minItems: 1
                  maxItems: 50
                  items:
                    type: object
                    required: [contact_id, content]
                    properties:
                      contact_id: { type: integer }
                      channel: { type: string }
                      content: { type: string }
                      attachments:
                        type: array
                        items:
                          type: object
                          properties:
                            type: { type: string }
                            url: { type: string, format: uri }
                            name: { type: string }
      responses:
        '200':
          description: Результат массовой отправки
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      sent: { type: integer }
                      failed: { type: integer }
                      results:
                        type: array
                        items:
                          type: object
                          properties:
                            index: { type: integer }
                            message_id: { type: integer, nullable: true }
                            conversation_id: { type: integer, nullable: true }
                            channel: { type: string, nullable: true }
                            error: { type: string, nullable: true }
                            message: { type: string, nullable: true }
        '400': { $ref: '#/components/responses/BadRequest' }

