# ВАЖНО (для будущих правок):
# — HTTP-методы (GET, POST, PUT, DELETE) — мировой стандарт, не переводимы
# — URL endpoint'ов (/public/v1/contacts) — технические идентификаторы
# — JSON-поля (contact_id, created_at) — программные идентификаторы
# — Статус-коды (200, 401, 403, 429) — мировой стандарт
# — Технические термины: Bearer, Token, JSON, Webhook, OAuth, JWT — устоявшиеся
# Переводятся: tags[].name, tags[].description, servers[].description, info.license.name,
#              summary/description endpoint'ов, ENUM-значения когда они для людей.
# UI-метки Redoc переводятся через public/js/lib/redoc-ru-i18n.js
# (Redoc 2.x не имеет встроенной локализации).

openapi: 3.0.3
info:
  title: BOTIX Public API
  description: |
    Публичный программный интерфейс платформы BOTIX (botix.pro) — позволяет интеграторам
    и сторонним разработчикам встраивать функционал BOTIX в свои продукты: магазины, CRM,
    мобильные приложения, бэкенды.

    **Авторизация:** заголовок `Authorization: Bearer btx_live_…`. Каждый ключ привязан
    к одному `project_id`. Каждый ключ имеет список `scopes` — операций, которые им
    разрешены. Без нужного scope — `403 INSUFFICIENT_SCOPE`.

    **Гейтинг по тарифу:**
    - тариф без `api_enabled` — `403 API_NOT_AVAILABLE_ON_PLAN`
    - триальный тариф (`api_write_enabled=0`) — read-only, POST/PUT/PATCH/DELETE → `403 TRIAL_READ_ONLY`
    - лимиты `api_rate_per_minute` / `api_rate_per_day` — из настроек тарифа (см. ЛК `/billing`)

    **Стандарт ответов:** обёртка `{success, data, meta}` для успеха и `{success:false, error:{code,message,details}}` для ошибки.

    **Версионирование:** `/public/v1/*` фиксирован. Новые поля в ответах могут добавляться, удаление/смена типов запрещены.

    ## Что нового в 1.1.0 (2026-05-22)

    - **Rate-limit заголовки** во всех ответах: `X-RateLimit-Limit`, `X-RateLimit-Remaining`, `X-RateLimit-Reset`. На 429 — дополнительно `Retry-After`.
    - **Cursor-based пагинация** — query-параметр `cursor` + поле `meta.next_cursor` параллельно с существующим `page`/`per_page` (старые клиенты не ломаются).
    - **Bulk endpoints** для интеграторов: `POST /contacts/bulk-create`, `POST /messages/bulk-send`, `POST /contacts/bulk-update` (до 100 операций за запрос, частичный успех).

    Изменения обратно-совместимые: все endpoint v1.0 работают без правок на стороне клиента.
  version: "1.1.0"
  contact:
    name: BOTIX
    url: https://botix.pro
    email: hello@botix.pro
  license:
    name: Условия использования публичного API BOTIX
    url: https://botix.pro/legal

servers:
  - url: https://api.botix.pro
    description: Боевой сервер
  - url: http://localhost:8888
    description: Localhost (монолит) — для разработки

security:
  - bearerAuth: []

tags:
  - name: System
    description: Служебные эндпоинты
  - name: Contacts
    description: Контакты (CRM-карточка клиента)
  - name: Messages
    description: Сообщения (история и отправка)
  - name: Chats
    description: Чаты (диалоги bot↔контакт)
  - name: Scenarios
    description: Сценарии (визуальный конструктор)
  - name: Channels
    description: Каналы связи (Telegram, виджет, …)
  - name: Webhooks
    description: Подписки на события

paths:
  /public/v1/me:
    get:
      operationId: meGet
      x-codeSamples:
        - lang: 'curl'
          source: |
            curl -X GET 'https://api.botix.pro/public/v1/me' \
              -H 'Authorization: Bearer btx_live_<ваш-ключ>'
        - lang: 'PHP'
          label: 'PHP (botix-pro/sdk)'
          source: |
            <?php
            use BotixPro\Sdk\Client;
            
            $client = new Client('btx_live_<ваш-ключ>');
            $result = $client->system()->meGet();
            print_r($result);
        - lang: 'Python'
          label: 'Python (botix)'
          source: |
            import botix
            
            client = botix.Client('btx_live_<ваш-ключ>')
            result = client.system.me_get()
            print(result)
        - lang: 'JavaScript'
          label: 'Node.js (@botix/sdk)'
          source: |
            import { BotixClient } from '@botix/sdk';
            
            const client = new BotixClient('btx_live_<ваш-ключ>');
            const result = await client.system.meGet();
            console.log(result);
      tags: ["System"]
      summary: Контекст текущего ключа
      description: Возвращает project_id, scopes, plan_key, остаток rate-limit
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /public/v1/contacts:
    get:
      operationId: contactsList
      x-codeSamples:
        - lang: 'curl'
          source: |
            curl -X GET 'https://api.botix.pro/public/v1/contacts?page=1&per_page=50&tag=vip' \
              -H 'Authorization: Bearer btx_live_<ваш-ключ>'
        - lang: 'PHP'
          label: 'PHP (botix-pro/sdk)'
          source: |
            <?php
            use BotixPro\Sdk\Client;
            
            $client = new Client('btx_live_<ваш-ключ>');
            $result = $client->contacts()->contactsList(['page' => 1, 'per_page' => 50, 'tag' => 'vip']);
            print_r($result);
        - lang: 'Python'
          label: 'Python (botix)'
          source: |
            import botix
            
            client = botix.Client('btx_live_<ваш-ключ>')
            result = client.contacts.contacts_list(page=1, per_page=50, tag='vip')
            print(result)
        - lang: 'JavaScript'
          label: 'Node.js (@botix/sdk)'
          source: |
            import { BotixClient } from '@botix/sdk';
            
            const client = new BotixClient('btx_live_<ваш-ключ>');
            const result = await client.contacts.contactsList({ page: 1, per_page: 50, tag: 'vip' });
            console.log(result);
      tags: ["Contacts"]
      summary: Список контактов
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - in: query
          name: tag
          schema: { type: string }
          description: Фильтр по тегу (точное совпадение)
        - in: query
          name: channel
          schema: { type: string, enum: [telegram, whatsapp, vk, widget, email, phone] }
        - in: query
          name: lead_status
          schema: { type: string, enum: [new, warm, hot, client, lost] }
        - in: query
          name: since
          schema: { type: string, format: date-time }
          description: Фильтр по created_at >= since
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessWithMeta'
                  - properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Contact' }
    post:
      operationId: contactsCreate
      x-codeSamples:
        - lang: 'curl'
          source: |
            curl -X POST 'https://api.botix.pro/public/v1/contacts' \
              -H 'Authorization: Bearer btx_live_<ваш-ключ>' \
              -H 'Content-Type: application/json' \
              -H "Idempotency-Key: $(uuidgen)" \
              -d '{
                "name": "Иван Иванов",
                "phone": "+79991234567",
                "channel": "telegram",
                "tags": [
                    "lead"
                ]
            }'
        - lang: 'PHP'
          label: 'PHP (botix-pro/sdk)'
          source: |
            <?php
            use BotixPro\Sdk\Client;
            
            $client = new Client('btx_live_<ваш-ключ>');
            $result = $client->contacts()->contactsCreate(['name' => 'Иван Иванов', 'phone' => '+79991234567', 'channel' => 'telegram', 'tags' => ['lead']]);
            print_r($result);
        - lang: 'Python'
          label: 'Python (botix)'
          source: |
            import botix
            
            client = botix.Client('btx_live_<ваш-ключ>')
            result = client.contacts.contacts_create(name='Иван Иванов', phone='+79991234567', channel='telegram', tags=['lead'])
            print(result)
        - lang: 'JavaScript'
          label: 'Node.js (@botix/sdk)'
          source: |
            import { BotixClient } from '@botix/sdk';
            
            const client = new BotixClient('btx_live_<ваш-ключ>');
            const result = await client.contacts.contactsCreate({ name: 'Иван Иванов', phone: '+79991234567', channel: 'telegram', tags: ['lead'] });
            console.log(result);
      tags: ["Contacts"]
      summary: Создать контакт
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContactWritable' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessContact'
        '400': { $ref: '#/components/responses/BadRequest' }

  /public/v1/contacts/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      operationId: contactsGet
      x-codeSamples:
        - lang: 'curl'
          source: |
            curl -X GET 'https://api.botix.pro/public/v1/contacts/12345' \
              -H 'Authorization: Bearer btx_live_<ваш-ключ>'
        - lang: 'PHP'
          label: 'PHP (botix-pro/sdk)'
          source: |
            <?php
            use BotixPro\Sdk\Client;
            
            $client = new Client('btx_live_<ваш-ключ>');
            $result = $client->contacts()->contactsGet(12345);
            print_r($result);
        - lang: 'Python'
          label: 'Python (botix)'
          source: |
            import botix
            
            client = botix.Client('btx_live_<ваш-ключ>')
            result = client.contacts.contacts_get(12345)
            print(result)
        - lang: 'JavaScript'
          label: 'Node.js (@botix/sdk)'
          source: |
            import { BotixClient } from '@botix/sdk';
            
            const client = new BotixClient('btx_live_<ваш-ключ>');
            const result = await client.contacts.contactsGet(12345);
            console.log(result);
      tags: ["Contacts"]
      summary: Карточка контакта
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessContact' }
          description: OK
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      operationId: contactsUpdate
      x-codeSamples:
        - lang: 'curl'
          source: |
            curl -X PUT 'https://api.botix.pro/public/v1/contacts/12345' \
              -H 'Authorization: Bearer btx_live_<ваш-ключ>' \
              -H 'Content-Type: application/json' \
              -H "Idempotency-Key: $(uuidgen)" \
              -d '{
                "name": "Иван Петров",
                "lead_status": "warm"
            }'
        - lang: 'PHP'
          label: 'PHP (botix-pro/sdk)'
          source: |
            <?php
            use BotixPro\Sdk\Client;
            
            $client = new Client('btx_live_<ваш-ключ>');
            $result = $client->contacts()->contactsUpdate(12345, ['name' => 'Иван Петров', 'lead_status' => 'warm']);
            print_r($result);
        - lang: 'Python'
          label: 'Python (botix)'
          source: |
            import botix
            
            client = botix.Client('btx_live_<ваш-ключ>')
            result = client.contacts.contacts_update(12345, name='Иван Петров', lead_status='warm')
            print(result)
        - lang: 'JavaScript'
          label: 'Node.js (@botix/sdk)'
          source: |
            import { BotixClient } from '@botix/sdk';
            
            const client = new BotixClient('btx_live_<ваш-ключ>');
            const result = await client.contacts.contactsUpdate(12345, { name: 'Иван Петров', lead_status: 'warm' });
            console.log(result);
      tags: ["Contacts"]
      summary: Обновить контакт
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContactWritable' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessContact' }
          description: OK
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      operationId: contactsDelete
      x-codeSamples:
        - lang: 'curl'
          source: |
            curl -X DELETE 'https://api.botix.pro/public/v1/contacts/12345' \
              -H 'Authorization: Bearer btx_live_<ваш-ключ>' \
              -H "Idempotency-Key: $(uuidgen)"
        - lang: 'PHP'
          label: 'PHP (botix-pro/sdk)'
          source: |
            <?php
            use BotixPro\Sdk\Client;
            
            $client = new Client('btx_live_<ваш-ключ>');
            $result = $client->contacts()->contactsDelete(12345);
            print_r($result);
        - lang: 'Python'
          label: 'Python (botix)'
          source: |
            import botix
            
            client = botix.Client('btx_live_<ваш-ключ>')
            result = client.contacts.contacts_delete(12345)
            print(result)
        - lang: 'JavaScript'
          label: 'Node.js (@botix/sdk)'
          source: |
            import { BotixClient } from '@botix/sdk';
            
            const client = new BotixClient('btx_live_<ваш-ключ>');
            const result = await client.contacts.contactsDelete(12345);
            console.log(result);
      tags: ["Contacts"]
      summary: Удалить контакт (soft delete)
      responses:
        '204': { description: No Content }
        '404': { $ref: '#/components/responses/NotFound' }

  /public/v1/contacts/{id}/tags:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    post:
      operationId: contactsAddTag
      x-codeSamples:
        - lang: 'curl'
          source: |
            curl -X POST 'https://api.botix.pro/public/v1/contacts/12345/tags' \
              -H 'Authorization: Bearer btx_live_<ваш-ключ>' \
              -H 'Content-Type: application/json' \
              -H "Idempotency-Key: $(uuidgen)" \
              -d '{
                "tag": "vip"
            }'
        - lang: 'PHP'
          label: 'PHP (botix-pro/sdk)'
          source: |
            <?php
            use BotixPro\Sdk\Client;
            
            $client = new Client('btx_live_<ваш-ключ>');
            $result = $client->contacts()->contactsAddTag(12345, ['tag' => 'vip']);
            print_r($result);
        - lang: 'Python'
          label: 'Python (botix)'
          source: |
            import botix
            
            client = botix.Client('btx_live_<ваш-ключ>')
            result = client.contacts.contacts_add_tag(12345, tag='vip')
            print(result)
        - lang: 'JavaScript'
          label: 'Node.js (@botix/sdk)'
          source: |
            import { BotixClient } from '@botix/sdk';
            
            const client = new BotixClient('btx_live_<ваш-ключ>');
            const result = await client.contacts.contactsAddTag(12345, { tag: 'vip' });
            console.log(result);
      tags: ["Contacts"]
      summary: Добавить тег контакту
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tag]
              properties:
                tag: { type: string, example: "vip" }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: object
                    properties:
                      tags:
                        type: array
                        items: { type: string }
          description: OK

  /public/v1/contacts/{id}/tags/{tag}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
      - in: path
        name: tag
        required: true
        schema: { type: string }
    delete:
      operationId: contactsRemoveTag
      x-codeSamples:
        - lang: 'curl'
          source: |
            curl -X DELETE 'https://api.botix.pro/public/v1/contacts/12345/tags/vip' \
              -H 'Authorization: Bearer btx_live_<ваш-ключ>' \
              -H "Idempotency-Key: $(uuidgen)"
        - lang: 'PHP'
          label: 'PHP (botix-pro/sdk)'
          source: |
            <?php
            use BotixPro\Sdk\Client;
            
            $client = new Client('btx_live_<ваш-ключ>');
            $result = $client->contacts()->contactsRemoveTag(12345, 'vip');
            print_r($result);
        - lang: 'Python'
          label: 'Python (botix)'
          source: |
            import botix
            
            client = botix.Client('btx_live_<ваш-ключ>')
            result = client.contacts.contacts_remove_tag(12345, 'vip')
            print(result)
        - lang: 'JavaScript'
          label: 'Node.js (@botix/sdk)'
          source: |
            import { BotixClient } from '@botix/sdk';
            
            const client = new BotixClient('btx_live_<ваш-ключ>');
            const result = await client.contacts.contactsRemoveTag(12345, 'vip');
            console.log(result);
      tags: ["Contacts"]
      summary: Снять тег с контакта
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      tags:
                        type: array
                        items: { type: string }
          description: OK

  /public/v1/contacts/bulk-create:
    post:
      operationId: contactsBulkCreate
      x-codeSamples:
        - lang: 'curl'
          source: |
            curl -X POST 'https://api.botix.pro/public/v1/contacts/bulk-create' \
              -H 'Authorization: Bearer btx_live_<ваш-ключ>' \
              -H 'Content-Type: application/json' \
              -H "Idempotency-Key: $(uuidgen)" \
              -d '{
                "contacts": [
                    {
                        "name": "Иван",
                        "phone": "+79991234567",
                        "channel": "telegram"
                    },
                    {
                        "name": "Мария",
                        "phone": "+79997654321",
                        "channel": "whatsapp"
                    }
                ]
            }'
        - lang: 'PHP'
          label: 'PHP (botix-pro/sdk)'
          source: |
            <?php
            use BotixPro\Sdk\Client;
            
            $client = new Client('btx_live_<ваш-ключ>');
            $result = $client->contacts()->contactsBulkCreate(['contacts' => [['name' => 'Иван', 'phone' => '+79991234567', 'channel' => 'telegram'], ['name' => 'Мария', 'phone' => '+79997654321', 'channel' => 'whatsapp']]]);
            print_r($result);
        - lang: 'Python'
          label: 'Python (botix)'
          source: |
            import botix
            
            client = botix.Client('btx_live_<ваш-ключ>')
            result = client.contacts.contacts_bulk_create(contacts=[{'name': 'Иван', 'phone': '+79991234567', 'channel': 'telegram'}, {'name': 'Мария', 'phone': '+79997654321', 'channel': 'whatsapp'}])
            print(result)
        - lang: 'JavaScript'
          label: 'Node.js (@botix/sdk)'
          source: |
            import { BotixClient } from '@botix/sdk';
            
            const client = new BotixClient('btx_live_<ваш-ключ>');
            const result = await client.contacts.contactsBulkCreate({ contacts: [{ name: 'Иван', phone: '+79991234567', channel: 'telegram' }, { name: 'Мария', phone: '+79997654321', channel: 'whatsapp' }] });
            console.log(result);
      tags: ["Contacts"]
      summary: Массовое создание контактов (v1.1)
      description: |
        Создаёт до 100 контактов одним запросом. Каждый item — в своей мини-транзакции,
        частичный успех допустим (см. поля `created`/`failed`/`results`).

        Bulk-операция в rate-limit считается как **1 запрос** (а не 100) — это сознательное
        послабление для поощрения bulk-вызовов.

        Поддерживает `Idempotency-Key` (24ч).
      parameters:
        - in: header
          name: Idempotency-Key
          required: false
          schema: { type: string, maxLength: 255 }
          description: |
            Уникальный токен запроса для защиты от дублей при сетевых сбоях. Рекомендация —
            UUID v4 на каждую логическую операцию. **TTL ключа — 24 часа.** После истечения
            тот же `Idempotency-Key` создаст новую операцию, кешированный результат не
            возвращается. Повтор в окне 24 часов вернёт сохранённый ответ + заголовок
            `Idempotent-Replayed: 1`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [contacts]
              properties:
                contacts:
                  type: array
                  minItems: 1
                  maxItems: 100
                  items: { $ref: '#/components/schemas/ContactWritable' }
      responses:
        '200':
          description: Результат массового создания (включая частичный успех)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BulkResult' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /public/v1/contacts/bulk-update:
    post:
      operationId: contactsBulkUpdate
      x-codeSamples:
        - lang: 'curl'
          source: |
            curl -X POST 'https://api.botix.pro/public/v1/contacts/bulk-update' \
              -H 'Authorization: Bearer btx_live_<ваш-ключ>' \
              -H 'Content-Type: application/json' \
              -H "Idempotency-Key: $(uuidgen)" \
              -d '{
                "updates": [
                    {
                        "id": 12345,
                        "fields": {
                            "lead_status": "hot"
                        }
                    },
                    {
                        "id": 12346,
                        "fields": {
                            "lead_status": "lost"
                        }
                    }
                ]
            }'
        - lang: 'PHP'
          label: 'PHP (botix-pro/sdk)'
          source: |
            <?php
            use BotixPro\Sdk\Client;
            
            $client = new Client('btx_live_<ваш-ключ>');
            $result = $client->contacts()->contactsBulkUpdate(['updates' => [['id' => 12345, 'fields' => ['lead_status' => 'hot']], ['id' => 12346, 'fields' => ['lead_status' => 'lost']]]]);
            print_r($result);
        - lang: 'Python'
          label: 'Python (botix)'
          source: |
            import botix
            
            client = botix.Client('btx_live_<ваш-ключ>')
            result = client.contacts.contacts_bulk_update(updates=[{'id': 12345, 'fields': {'lead_status': 'hot'}}, {'id': 12346, 'fields': {'lead_status': 'lost'}}])
            print(result)
        - lang: 'JavaScript'
          label: 'Node.js (@botix/sdk)'
          source: |
