components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: "btx_live_<40-char-alnum>"

  parameters:
    IdPath:
      in: path
      name: id
      required: true
      schema: { type: integer }
    Page:
      in: query
      name: page
      schema: { type: integer, minimum: 1, default: 1 }
    PerPage:
      in: query
      name: per_page
      schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
    Cursor:
      in: query
      name: cursor
      required: false
      schema: { type: string }
      description: |
        v1.1+. Opaque cursor для постраничной выборки. Если передан — параметры `page`/`per_page` игнорируются.
        Получите следующий cursor из `meta.next_cursor` предыдущего ответа.
        `null`/отсутствие `next_cursor` = последняя страница.
    Limit:
      in: query
      name: limit
      required: false
      schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
      description: |
        v1.1+. Размер cursor-страницы. Используется только в cursor-режиме
        (`?cursor=...`); для классической page-пагинации применяется `per_page`.

  headers:
    XRateLimitLimit:
      description: Лимит запросов за минуту по текущему тарифу клиента
      schema: { type: integer }
    XRateLimitRemaining:
      description: Сколько ещё запросов разрешено в текущем минутном окне
      schema: { type: integer }
    XRateLimitReset:
      description: Unix timestamp следующего обнуления минутного окна
      schema: { type: integer }
    RetryAfter:
      description: Секунды до возможности повтора (только при 429)
      schema: { type: integer }

  responses:
    Unauthorized:
      description: Ключ отсутствует или невалиден
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: |
        Недостаточно scope, тариф без API, или режим read-only:
        `INSUFFICIENT_SCOPE` / `API_NOT_AVAILABLE_ON_PLAN` / `TRIAL_READ_ONLY`
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Ресурс не найден или не принадлежит project_id
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    BadRequest:
      description: Ошибка валидации / некорректный JSON
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    RateLimited:
      description: Превышен лимит (минутный или суточный)
      headers:
        Retry-After: { $ref: '#/components/headers/RetryAfter' }
        X-RateLimit-Limit: { $ref: '#/components/headers/XRateLimitLimit' }
        X-RateLimit-Remaining: { $ref: '#/components/headers/XRateLimitRemaining' }
        X-RateLimit-Reset: { $ref: '#/components/headers/XRateLimitReset' }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  schemas:
    SuccessWithMeta:
      type: object
      properties:
        success: { type: boolean, example: true }
        data: {}
        meta:
          type: object
          properties:
            page: { type: integer, description: "Только в page-режиме" }
            per_page: { type: integer, description: "Только в page-режиме" }
            total: { type: integer, description: "Только в page-режиме" }
            next_cursor:
              type: string
              nullable: true
              description: "v1.1+. В cursor-режиме — токен для следующей страницы. null = последняя страница. В page-режиме отсутствует."
            has_more:
              type: boolean
              description: "v1.1+. true если есть ещё страницы (cursor-режим)."

    Error:
      type: object
      properties:
        success: { type: boolean, example: false }
        error:
          type: object
          properties:
            code:
              type: string
              enum:
                - MISSING_API_KEY
                - INVALID_API_KEY
                - KEY_REVOKED
                - IP_BANNED
                - INSUFFICIENT_SCOPE
                - API_NOT_AVAILABLE_ON_PLAN
                - TRIAL_READ_ONLY
                - RATE_LIMIT_EXCEEDED
                - VALIDATION_ERROR
                - INVALID_JSON
                - INVALID_CURSOR
                - NOT_FOUND
                - NO_CHANNEL_AVAILABLE
                - CHANNEL_NOT_SUPPORTED_YET
                - CHANNEL_NOT_ALLOWED
                - CHANNEL_NOT_CONNECTED
                - CONTACT_NOT_REACHABLE
                - CONTACT_NOT_FOUND
                - CONTACT_BUSY
                - SCENARIO_NOT_FOUND
                - SCENARIO_INACTIVE
                - NO_START_BLOCK
                - DELIVERY_FAILED
            message: { type: string }
            details: { type: object, additionalProperties: true }

    MeResponse:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: object
          properties:
            project_id: { type: integer }
            api_key_id: { type: integer }
            scopes:
              type: array
              items: { type: string }
            plan_key: { type: string }
            limits:
              type: object
              properties:
                api_enabled: { type: boolean }
                api_write_enabled: { type: boolean }
                per_minute: { type: integer }
                per_day: { type: integer }
            rate_limit:
              type: object
              properties:
                limit: { type: integer }
                remaining: { type: integer }
                reset_at: { type: string, format: date-time }

    SuccessContact:
      type: object
      properties:
        success: { type: boolean }
        data: { $ref: '#/components/schemas/Contact' }

    BulkResult:
      type: object
      description: |
        Универсальный ответ bulk-эндпоинтов. Поле `created`/`updated` зависит от операции.
        В `results` — массив элементов с индексом и либо `id` (успех), либо `error` (отказ).
      properties:
        success: { type: boolean }
        data:
          type: object
          properties:
            created: { type: integer, nullable: true, description: "Для bulk-create" }
            updated: { type: integer, nullable: true, description: "Для bulk-update" }
            failed: { type: integer }
            results:
              type: array
              items:
                type: object
                properties:
                  index: { type: integer }
                  id: { type: integer, nullable: true }
                  error: { type: string, nullable: true, example: "DUPLICATE_KEY" }
                  message: { type: string, nullable: true }

    Contact:
      type: object
      properties:
        id: { type: integer }
        project_id: { type: integer }
        first_name: { type: string, nullable: true }
        last_name: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        email: { type: string, nullable: true }
        telegram_user_id: { type: integer, nullable: true }
        telegram_username: { type: string, nullable: true }
        whatsapp_phone: { type: string, nullable: true }
        vk_user_id: { type: integer, nullable: true }
        avatar_url: { type: string, nullable: true }
        city: { type: string, nullable: true }
        timezone: { type: string, nullable: true }
        language: { type: string, nullable: true, example: "ru" }
        birthday: { type: string, format: date, nullable: true }
        tags:
          type: array
          items: { type: string }
        lead_status:
          type: string
          enum: [new, warm, hot, client, lost]
        messages_count: { type: integer }
        last_message_at: { type: string, format: date-time, nullable: true }
        last_channel:
          type: string
          nullable: true
          description: Последний канал, через который контакт писал (telegram/vk/widget/...)
        first_message_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time, nullable: true }
        widget_session_id:
          type: string
          nullable: true
          description: Идентификатор сессии в виджете (для канала widget)

    ContactWritable:
      type: object
      properties:
        first_name: { type: string }
        last_name: { type: string }
        phone: { type: string }
        email: { type: string }
        telegram_user_id: { type: integer }
        telegram_username: { type: string }
        whatsapp_phone: { type: string }
        vk_user_id: { type: integer }
        avatar_url: { type: string }
        city: { type: string }
        timezone: { type: string }
        language: { type: string }
        birthday: { type: string, format: date }
        tags:
          type: array
          items: { type: string }
        lead_status:
          type: string
          enum: [new, warm, hot, client, lost]

    Message:
      type: object
      properties:
        id: { type: integer }
        project_id: { type: integer }
        conversation_id: { type: integer }
        contact_id: { type: integer }
        role: { type: string, enum: [user, bot, operator, system] }
        content: { type: string }
        attachments:
          type: array
          nullable: true
          items:
            type: object
            additionalProperties: true
        source: { type: string, nullable: true, example: "scenario" }
        scenario_id: { type: integer, nullable: true }
        block_id: { type: string, nullable: true }
        channel: { type: string }
        is_read: { type: integer, enum: [0, 1] }
        created_at: { type: string, format: date-time }

    Chat:
      type: object
      properties:
        id: { type: integer }
        project_id: { type: integer }
        contact_id: { type: integer }
        channel: { type: string }
        scenario_id: { type: integer, nullable: true }
        status: { type: string, enum: [active, paused, completed, operator] }
        messages_count: { type: integer }
        last_message_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time, nullable: true }

    Scenario:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: string }
        is_active: { type: boolean }
        trigger_type: { type: string }
        trigger_value: { type: string, nullable: true }
        channels:
          type: array
          items: { type: string }
        version: { type: integer }
        published_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time, nullable: true }

    Channel:
      type: object
      properties:
        type: { type: string, example: "telegram" }
        label: { type: string, example: "Telegram" }
        allowed: { type: boolean, description: "Канал доступен на текущем тарифе" }
        connected: { type: boolean, description: "Канал фактически подключён" }
        connected_at: { type: string, format: date-time, nullable: true }

    Webhook:
      type: object
      properties:
        id: { type: integer }
        project_id: { type: integer }
        api_key_id: { type: integer }
        url: { type: string, format: uri }
        events:
          type: array
          items: { $ref: '#/components/schemas/WebhookEvent' }
        status: { type: string, enum: [active, paused, failed] }
        fail_count: { type: integer }
        last_delivered_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

    WebhookEvent:
      type: string
      enum:
        - contact.created
        - contact.updated
        - contact.deleted
        - contact.tagged
        - message.received
        - message.sent
        - chat.opened
        - chat.closed
        - chat.assigned
        - scenario.started
        - scenario.completed
        - scenario.failed
