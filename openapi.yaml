      tags: ["Contacts"]
      summary: Массовое обновление контактов (v1.1)
      description: |
        Обновляет до 100 контактов одним запросом. Каждый item — `{id, fields:{...}}`.
        Частичный успех допустим. Поддерживает `Idempotency-Key`.
      parameters:
        - in: header
          name: Idempotency-Key
          required: false
          schema: { type: string, maxLength: 255 }
          description: |
            Уникальный токен запроса для защиты от дублей при сетевых сбоях. Рекомендация —
            UUID v4 на каждую логическую операцию. **TTL ключа — 24 часа.** После истечения
            тот же `Idempotency-Key` создаст новую операцию, кешированный результат не
            возвращается. Повтор в окне 24 часов вернёт сохранённый ответ + заголовок
            `Idempotent-Replayed: 1`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [updates]
              properties:
                updates:
                  type: array
                  minItems: 1
                  maxItems: 100
                  items:
                    type: object
                    required: [id, fields]
                    properties:
                      id: { type: integer }
                      fields: { $ref: '#/components/schemas/ContactWritable' }
      responses:
        '200':
          description: Результат массового обновления
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BulkResult' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /public/v1/messages/bulk-send:
